name: CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
    paths:
      - ".github/workflows/ci-cd.yml"
      - "Notebooklm/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-cd.yml"
      - "Notebooklm/**"
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-quality:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Notebooklm

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Notebooklm/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run Ruff checks
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy src/notebooklm

      - name: Run pre-commit
        run: pre-commit run --all-files

  unit-tests:
    name: Unit Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-quality
    defaults:
      run:
        working-directory: Notebooklm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: Notebooklm/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run unit tests
        run: pytest tests/unit --cov=src/notebooklm --cov-report=term-missing --cov-fail-under=90

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: Notebooklm

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Notebooklm/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run integration tests
        run: pytest tests/integration -v

  verify-package:
    name: Verify Package Build
    runs-on: ubuntu-latest
    needs: integration-tests
    defaults:
      run:
        working-directory: Notebooklm

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Notebooklm/pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

  docker-image:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: verify-package
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/notebooklm_api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Notebooklm
          file: ./Notebooklm/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs:
      - docker-image
    if: always()

    steps:
      - name: Final status
        run: |
          echo "CI/CD pipeline finished"
          echo "Docker image job result: ${{ needs.docker-image.result }}"
