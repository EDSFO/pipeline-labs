# =============================================================================
# Opensquad SaaS - Production Docker Compose
# =============================================================================
# Production-specific configuration for Hetzner deployment
# Usage: docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: opensquad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: opensquad
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensquad"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    networks:
      - opensquad-network

  redis:
    restart: always
    command: redis-server --save 60 1 --loglevel warning --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    networks:
      - opensquad-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: always
    environment:
      DATABASE_URL: postgresql://opensquad:${POSTGRES_PASSWORD}@postgres:5432/opensquad
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      BACKEND_URL: ${BACKEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    networks:
      - opensquad-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: always
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NODE_ENV: production
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_STRIPE_PRICE_ID_STARTER: ${STRIPE_PRICE_ID_STARTER}
      NEXT_PUBLIC_STRIPE_PRICE_ID_GROWTH: ${STRIPE_PRICE_ID_GROWTH}
      NEXT_PUBLIC_STRIPE_PRICE_ID_SCALE: ${STRIPE_PRICE_ID_SCALE}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    networks:
      - opensquad-network

  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"
    networks:
      - opensquad-network

networks:
  opensquad-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
